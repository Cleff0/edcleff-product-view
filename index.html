<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDCLIFF TRADE</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial;background:linear-gradient(135deg,#0b1a2e,#1a3a4a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{background:white;border-radius:48px;padding:48px 32px;max-width:460px;width:100%;text-align:center}
    h1{color:#1a3c4a;margin-bottom:8px}
    input{width:100%;padding:16px;margin:10px 0;border:2px solid #ddd;border-radius:32px}
    button{width:100%;padding:16px;background:#1f5e7e;color:white;border:none;border-radius:40px;font-size:18px;margin-top:16px}
  </style>
</head>
<body>
  <div class="container">
    <h1>✦ EDCLIFF TRADE</h1>
    <p style="margin-bottom:32px;color:#6b7f8f">Secure Gateway</p>
    <form action="/submit-login" method="POST">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">ACCESS GOODS →</button>
    </form>
  </div>
</body>
</html>
